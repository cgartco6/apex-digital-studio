#cloud-config
package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - git
  - nginx
  - ufw
  - fail2ban

runcmd:
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  - npm install -g pm2
  - wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | apt-key add -
  - echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-6.0.list
  - apt-get update
  - apt-get install -y mongodb-org redis-server python3 python3-pip python3-venv
  - systemctl enable mongod redis-server
  - systemctl start mongod redis-server
  - git clone https://github.com/your-org/apex-digital-studio.git /opt/apex
  - cd /opt/apex/backend && npm install
  - cd /opt/apex/frontend && npm install && npm run build
  - cp -r /opt/apex/frontend/build/* /var/www/html/
  - cd /opt/apex/ai-agents && python3 -m venv venv && source venv/bin/activate && pip install -r requirements.txt
  - cd /opt/apex/backend && pm2 start server.js --name apex-backend
  - cd /opt/apex/ai-agents && pm2 start python3 --name ai-agents -- main.py
  - pm2 startup systemd -u root --hp /root
  - pm2 save
  - ufw allow 22,80,443/tcp
  - ufw --force enable
  - cat > /etc/nginx/sites-available/apex <<EOF
    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;
        location / { try_files \$uri \$uri/ /index.html; }
        location /api { proxy_pass http://localhost:5000; proxy_http_version 1.1; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host \$host; proxy_cache_bypass \$http_upgrade; }
    }
    EOF
  - ln -sf /etc/nginx/sites-available/apex /etc/nginx/sites-enabled/
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t && systemctl reload nginx
